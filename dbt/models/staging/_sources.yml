version: 2

sources:
  - name: raw
    database: NYC_311
    schema: RAW
    tables:
      - name: socrata_311
        loaded_at_field: ingestion_timestamp
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}
        columns:
          - name: unique_key
            description: Socrata-assigned unique identifier for each 311 request

      - name: acs_demographics
        description: US Census ACS 5-Year tract-level demographics for NYC
        columns:
          - name: geo_id
            description: Full Census GeoID for the tract
