name: raw_311_socrata_checkpoint
config_version: 1.0
class_name: Checkpoint
run_name_template: "%Y%m%d-%H%M%S-raw-311"
validations:
  - batch_request:
      datasource_name: snowflake_nyc311
      data_connector_name: default_configured_data_connector_name
      data_asset_name: RAW.SOCRATA_311
    expectation_suite_name: raw_311_socrata
action_list:
  - name: store_validation_result
    action:
      class_name: StoreValidationResultAction
  - name: update_data_docs
    action:
      class_name: UpdateDataDocsAction
